# ============================================================
# Orange Pi 5 Voice Agent - Configuration
# ============================================================

# -- Run mode --
# "dev"  = Mac with mic (keyboard + voice recording)
# "text" = pure text input (no mic/speaker needed, best for Docker)
# "prod" = Orange Pi 5 (GPIO button, real 4G modem)
mode: dev

# -- LLM / Agent --
agent:
  # "deepseek", "dashscope", "openai", or "ollama"
  provider: deepseek
  model: deepseek-chat
  # API key read from env: DEEPSEEK_API_KEY (or DASHSCOPE_API_KEY / OPENAI_API_KEY)
  temperature: 0.3
  max_tokens: 512

# -- Speech-to-Text --
stt:
  # "local_whisper" (free, no key), "openai_whisper", or "dashscope"
  provider: local_whisper
  language: zh
  # Whisper model: tiny/base/small/medium/large (bigger = more accurate but slower)
  # Env var WHISPER_MODEL overrides this. "medium" recommended for Mac, "small" for Orange Pi.
  whisper_model: medium

# -- Text-to-Speech --
tts:
  # "edge" (edge-tts, free) or "pyttsx3" (offline fallback)
  provider: edge
  voice: zh-CN-XiaoxiaoNeural
  rate: "+0%"

# -- Audio --
audio:
  sample_rate: 16000
  channels: 1
  # device index (null = system default). Run `python3 -m sounddevice` to list.
  input_device: null
  # seconds of silence before auto-stop (0 = manual stop only)
  silence_timeout: 2.0
  silence_threshold: 500

# -- Telephony / 4G Modem --
telephony:
  # "real", "mock", or "aliyun"
  modem_mode: mock
  serial_port: /dev/ttyUSB2
  baud_rate: 115200
  timeout: 1
  # Aliyun Voice API (requires enterprise credentials)
  # aliyun:
  #   access_key_id: ""       # or env ALIBABA_CLOUD_ACCESS_KEY_ID
  #   access_key_secret: ""   # or env ALIBABA_CLOUD_ACCESS_KEY_SECRET
  #   called_show_number: ""  # purchased voice number
  #   tts_code: ""            # TTS template code

# -- GPIO (Orange Pi 5) --
gpio:
  chip: gpiochip0
  button_pin: 7
  led_pin: 11
